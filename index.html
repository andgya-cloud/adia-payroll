<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADIA Payroll Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D1B4B;--navy-deep:#080f2e;--navy-mid:#162060;
  --gold:#C8960C;--gold-light:#f5e6b8;--gold-mid:#d4a843;
  --white:#fff;--surface:#f4f6fb;--surface2:#edf0f8;
  --text:#0D1B4B;--muted:#6b7a9e;--border:#d6dcee;
  --red:#c0392b;--red-light:#fce8e7;
  --green:#1B6B3A;--green-light:#e8f5ee;
  --blue-label:#5b9ecf;--sidebar:228px;
}
html,body{height:100%;margin:0;padding:0;overflow:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--surface);color:var(--text);}

/* ── SIDEBAR ── */
.app{display:flex;height:100vh;}
.sidebar{width:var(--sidebar);background:var(--navy);flex-shrink:0;display:flex;flex-direction:column;}
.logo-area{padding:16px 14px 12px;border-bottom:1px solid rgba(200,150,12,0.3);text-align:center;}
.logo-area img{width:76px;height:76px;border-radius:8px;display:block;margin:0 auto 8px;}
.logo-name{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1.6px;text-transform:uppercase;}
.logo-sub{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.8px;margin-top:2px;text-transform:uppercase;}

.nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,0.28);letter-spacing:1.2px;text-transform:uppercase;padding:12px 16px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .12s;}
.nav-item:hover{background:rgba(255,255,255,0.06);}
.nav-item.active{background:rgba(200,150,12,0.15);border-left-color:var(--gold);}
.nav-item .ni{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.nav-item .nl{font-size:12.5px;color:rgba(255,255,255,0.72);white-space:nowrap;}
.nav-item.active .nl{color:var(--gold);font-weight:600;}
.nav-item .nb{margin-left:auto;background:var(--gold);color:var(--navy);font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;}

.sidebar-footer{padding:11px 14px;border-top:1px solid rgba(255,255,255,0.08);}
.user-chip{display:flex;align-items:center;gap:8px;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);flex-shrink:0;}
.uname{font-size:11px;color:rgba(255,255,255,0.82);font-weight:500;}
.urole{font-size:9px;color:rgba(255,255,255,0.38);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--white);padding:0 20px;height:52px;display:flex;align-items:center;border-bottom:1px solid var(--border);gap:14px;flex-shrink:0;}
.page-title{font-size:15px;font-weight:700;color:var(--navy);}
.page-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.month-pill{background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:11px;color:var(--muted);}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .12s;}
.btn:hover{opacity:.88;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--border);}
.btn-red{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-sm{padding:4px 10px;font-size:11px;}

.content{flex:1;overflow-y:auto;padding:18px 20px;}

/* ── CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.k-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.k-val{font-size:22px;font-weight:700;}
.k-sub{font-size:10px;color:var(--muted);margin-top:3px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;}
.card-title{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);padding-bottom:8px;display:flex;align-items:center;justify-content:space-between;}

.dr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--surface2);font-size:12px;}
.dr:last-child{border-bottom:none;}
.dr .dl{color:var(--muted);}
.dr .dv{font-weight:600;color:var(--navy);}

.pb-wrap{margin-bottom:10px;}
.pb-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.pb{background:var(--surface2);border-radius:4px;height:6px;}
.pb-fill{height:6px;border-radius:4px;background:var(--gold);}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--surface2);color:var(--navy);font-weight:700;padding:9px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--surface2);color:var(--text);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface);}
.tbl .red{color:var(--red);}
.tbl .grn{color:var(--green);font-weight:600;}
.tbl .bold{font-weight:600;}

.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;}
.pill-active{background:var(--green-light);color:var(--green);}
.pill-inactive{background:var(--red-light);color:var(--red);}
.pill-leave{background:#fff3cd;color:#856404;}
.pill-pending{background:#fff3cd;color:#856404;}
.pill-filed{background:var(--green-light);color:var(--green);}
.pill-approved{background:var(--green-light);color:var(--green);}
.pill-rejected{background:var(--red-light);color:var(--red);}

/* ── ACTION LINKS ── */
.act-link{color:var(--gold);cursor:pointer;font-size:11px;font-weight:600;border:none;background:none;padding:0;margin-left:6px;}
.act-link:hover{text-decoration:underline;}

/* ── FORMS ── */
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:500;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 10px;font-size:13px;
  border:1px solid var(--border);border-radius:7px;
  background:var(--white);color:var(--text);
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,150,12,.12);
}
.field textarea{resize:vertical;min-height:60px;}
.hint{font-size:10px;color:var(--muted);margin-top:2px;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--navy);border-bottom:2px solid var(--gold-light);padding-bottom:5px;margin-bottom:10px;margin-top:16px;}
.sec-label:first-child{margin-top:0;}

/* ── PAYE RESULT ── */
.res-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;margin-top:16px;}
.chk{width:24px;height:24px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.res-title{font-size:15px;font-weight:700;color:var(--green);}
.res-period{font-size:12px;color:var(--blue-label);margin-bottom:12px;}
.res-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--surface2);font-size:13px;}
.res-row .rl{color:var(--blue-label);}
.res-row .rv{font-variant-numeric:tabular-nums;}
.grp-hd{font-size:13px;font-weight:700;padding:9px 0 2px;}
.sub-box{display:flex;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;margin:5px 0;font-size:13px;}
.sub-box .sl{color:var(--blue-label);}
.sub-box .sv{font-weight:700;font-variant-numeric:tabular-nums;}
.net-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:14px;margin-top:10px;}
.net-card .nl{font-size:13px;color:var(--blue-label);margin-bottom:4px;}
.net-card .nv{font-size:22px;font-weight:700;}

/* ── PAYSLIP ── */
.payslip-wrap{max-width:600px;margin:0 auto;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ps-header{background:var(--navy);padding:18px 20px;display:flex;align-items:center;gap:14px;}
.ps-header img{width:52px;height:52px;border-radius:6px;}
.ps-org h2{font-size:14px;font-weight:700;color:var(--gold);}
.ps-org p{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px;}
.ps-period{margin-left:auto;text-align:right;}
.ps-period .pm{font-size:11px;color:var(--gold);font-weight:600;}
.ps-period .pp{font-size:10px;color:rgba(255,255,255,.45);}
.ps-body{padding:16px 20px;}
.ps-emp{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;background:var(--surface);border-radius:7px;padding:12px;}
.ps-field .pf-l{font-size:11px;color:var(--muted);margin-bottom:2px;}
.ps-field .pf-v{font-weight:600;font-size:12px;color:var(--navy);}
.ps-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px;}
.ps-tbl th{background:var(--navy);color:var(--gold);padding:7px 10px;text-align:left;font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
.ps-tbl td{padding:7px 10px;border-bottom:1px solid var(--surface2);}
.ps-tbl td:last-child{text-align:right;font-variant-numeric:tabular-nums;}
.ps-tbl .grp{background:var(--surface2);}
.ps-tbl .grp td{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:5px 10px;}
.ps-tbl .total td{font-weight:700;background:var(--surface);}
.ps-net{background:var(--navy);color:#fff;border-radius:7px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.ps-net .pn-l{font-size:12px;color:rgba(255,255,255,.7);}
.ps-net .pn-v{font-size:20px;font-weight:700;color:var(--gold);}
.ps-footer{padding:10px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);text-align:center;}
.ps-actions{display:flex;gap:8px;margin-bottom:14px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:12px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-hdr{background:var(--navy);padding:16px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h3{font-size:14px;font-weight:700;color:var(--gold);}
.modal-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;line-height:1;}
.modal-body{padding:20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:2000;transform:translateY(80px);opacity:0;transition:all .3s;border-left:4px solid var(--gold);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left-color:var(--green);}
.toast.error{border-left-color:var(--red);}

/* ── STATUTORY CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;}
.stat-card .sc-icon{font-size:20px;margin-bottom:6px;}
.stat-card .sc-name{font-size:12px;font-weight:700;color:var(--navy);}
.stat-card .sc-due{font-size:10px;color:var(--muted);margin-top:2px;}
.stat-card .sc-amt{font-size:18px;font-weight:700;color:var(--navy);margin:8px 0;}
.sc-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;}
.sc-filed{background:var(--green-light);color:var(--green);}
.sc-pending{background:#fff3cd;color:#856404;}

/* ── LEAVE SUMMARY ── */
.leave-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.lv-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.lv-card .lv-n{font-size:24px;font-weight:700;color:var(--navy);}
.lv-card .lv-l{font-size:10px;color:var(--muted);}

/* ── PAYROLL RUN STEPS ── */
.run-steps{display:flex;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.run-step{flex:1;padding:12px 8px;text-align:center;background:#fff;border-right:1px solid var(--border);font-size:10px;cursor:default;}
.run-step:last-child{border-right:none;}
.run-step.done{background:var(--green-light);color:var(--green);}
.run-step.active-step{background:var(--navy);color:#fff;}
.run-step .sn{font-weight:700;font-size:13px;display:block;margin-bottom:2px;}

/* ── REPORT CARDS ── */
.rpt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.rpt-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.rpt-card:hover{border-color:var(--gold);box-shadow:0 2px 12px rgba(200,150,12,.15);}
.rpt-icon{font-size:22px;margin-bottom:8px;}
.rpt-name{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.rpt-desc{font-size:10px;color:var(--muted);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .ei{font-size:36px;margin-bottom:10px;}
.empty p{font-size:13px;}

/* ── SETTINGS TOGGLE ── */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--surface2);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:12px;color:var(--navy);}
.toggle-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.3s;}
.toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--gold);}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── DELETE AUTH MODAL ── */
.auth-modal-hdr{background:var(--red);padding:16px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;}
.auth-modal-hdr h3{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;}
.auth-warning{background:#fff8f8;border:1px solid #f5c6c6;border-radius:8px;padding:12px 14px;margin-bottom:14px;}
.auth-warning p{font-size:12px;color:var(--red);line-height:1.5;}
.auth-warning strong{font-weight:700;}
.auth-who{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.auth-who-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;}
.auth-who-item{display:flex;align-items:center;gap:8px;padding:4px 0;}
.auth-who-avatar{width:22px;height:22px;border-radius:50%;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.auth-who-name{font-size:12px;font-weight:500;color:var(--navy);}
.auth-who-role{font-size:10px;color:var(--muted);}
.delete-target-box{background:#fff0f0;border:1.5px dashed #e88;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.delete-target-box .dt-icon{font-size:20px;}
.delete-target-box .dt-name{font-size:13px;font-weight:700;color:var(--red);}
.delete-target-box .dt-info{font-size:11px;color:var(--muted);}
.act-link-del{color:var(--red);cursor:pointer;font-size:11px;font-weight:700;border:none;background:none;padding:0;margin-left:6px;opacity:.85;}
.act-link-del:hover{opacity:1;text-decoration:underline;}
.auth-attempts{font-size:11px;color:var(--red);text-align:center;margin-top:8px;min-height:16px;}
.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>

<div class="app">

<!-- ═══ SIDEBAR ═══ -->

// ═══════════════════════════════════════════════════════════════
// TAX FUNCTIONS (KRA 2026)
// ═══════════════════════════════════════════════════════════════
function cSHIF(g){return g*0.0275;}
function cAHL(g){ return g*0.015;}
function cIT(t){
  if(t<=0)return 0;
  var b=[[24000,.10],[8333,.25],[467667,.30],[300000,.325],[Infinity,.35]],tax=0,rem=t;
  for(var i=0;i<b.length;i++){if(rem<=0)break;var c=Math.min(rem,b[i][0]);tax+=c*b[i][1];rem-=c;}
  return tax;
}
function cPAYE(g,insRelief,mortRelief){
  insRelief=insRelief||0; mortRelief=mortRelief||0;
  var t=g-cSHIF(g)-cAHL(g);
  return Math.max(0,cIT(t)-2400-Math.min(insRelief*.15,5000)-Math.min(mortRelief*.25,25000));
}
function cNet(g){return g-cSHIF(g)-cAHL(g)-cPAYE(g);}

function deleteEmployee(idx){
  var e=EMP[idx];
  if(!e){return;}
  _deleteTarget={idx:idx, attempts:0, authenticated:[]};

  var whoHtml=STAKEHOLDERS.map(function(s){
    return '<div class="auth-who-item">'+
      '<div class="auth-who-avatar">'+s.initial+'</div>'+

  }).join('');

  var body=
    '<div class="delete-target-box">'+
      '<div class="dt-icon">👤</div>'+
      '<div>'+
        '<div class="dt-name">'+e.name+'</div>'+
        '<div class="dt-info">'+e.id+' · '+e.dept+' · '+e.role+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="auth-warning">'+
      '<p>⚠️ <strong>This action is irreversible and requires THREE different stakeholder authorizations.</strong> Deleting an employee removes all their records from the system.</p>'+
    '</div>'+
    '<div id="auth-progress" style="background:#f4f6fb;border-radius:8px;padding:10px 12px;margin-bottom:14px;display:none">'+
      '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px">Authorizations: <span id="auth-count">0</span>/3</div>'+
      '<div id="auth-list" style="font-size:10px;color:var(--muted)"></div>'+
    '</div>'+
    '<div class="auth-who">'+
      '<div class="auth-who-title">🔐 Authorised Stakeholders (Any 3 Required)</div>'+
      whoHtml+
    '</div>'+
    '<div class="f2">'+
      '<div class="field"><label>Username</label>'+
        '<input type="text" id="del_user" placeholder="e.g. elizabeth.mutuku" autocomplete="off">'+
      '</div>'+
      '<div class="field"><label>Password</label>'+
        '<input type="password" id="del_pass" placeholder="••••••••••••" autocomplete="off" onkeydown="if(event.key===\'Enter\')attemptDelete()">'+
      '</div>'+
    '</div>'+
    '<div class="auth-attempts" id="auth-msg"></div>';

  // Custom red-header modal
  document.getElementById('modal-title').innerHTML='🗑️  Authorisation Required — Delete Employee';
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=
    '<button class="btn btn-red" onclick="attemptDelete()" id="delete-verify-btn">Verify Stakeholder</button>'+
    '<button class="btn btn-outline" onclick="cancelDelete()">Cancel</button>';

  // Override header colour
  document.querySelector('.modal-hdr').style.background='var(--red)';
  document.querySelector('.modal-hdr h3').style.color='#fff';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var u=document.getElementById('del_user');if(u)u.focus();},100);
}

function attemptDelete(){
  if(!_deleteTarget){return;}
  var user=(gv('del_user')||'').trim().toLowerCase();
  var pass=gv('del_pass')||'';
  var ph=_h(pass);
  var matched=null;
  STAKEHOLDERS.forEach(function(s){
    if(s.username===user && s.hash===ph) matched=s;
  });

  if(matched){
    // Check if this stakeholder already authenticated
    var alreadyAuth=_deleteTarget.authenticated.some(function(s){return s.username===matched.username;});
    if(alreadyAuth){
      var msg=document.getElementById('auth-msg');
      if(msg) msg.innerHTML='<strong>'+matched.name+' has already authorized. Please use a different stakeholder.</strong>';
      var passEl=document.getElementById('del_pass');
      if(passEl){passEl.value='';passEl.focus();}
      return;
    }

    // Add to authenticated list
    _deleteTarget.authenticated.push(matched);
    var authCount=_deleteTarget.authenticated.length;

    // Update progress display
    var progressDiv=document.getElementById('auth-progress');
    var countSpan=document.getElementById('auth-count');
    var listDiv=document.getElementById('auth-list');
    if(progressDiv) progressDiv.style.display='block';
    if(countSpan) countSpan.textContent=authCount;
    if(listDiv){
      listDiv.innerHTML='✓ Authorized: '+_deleteTarget.authenticated.map(function(s){return s.name+' ('+s.role+')';}).join(', ');
    }

    // Clear fields
    var userEl=document.getElementById('del_user');
    var passEl=document.getElementById('del_pass');
    if(userEl) userEl.value='';
    if(passEl) passEl.value='';

    if(authCount >= 3){
      // THREE STAKEHOLDERS VERIFIED — PROCEED WITH DELETION
      var e=EMP[_deleteTarget.idx];
      var authNames=_deleteTarget.authenticated.map(function(s){return s.name;}).join(', ');
      
      var logEntry={
        action:'DELETE',
        employee:e.name+' ('+e.id+')',
        by:authNames,
        at:new Date().toLocaleString('en-KE'),
      };
      DELETE_LOG.unshift(logEntry);
      
      // Also log to system change log
      logChange('EMPLOYEE DELETED', e.name+' ('+e.id+') removed from '+e.dept, 'Authorized by: '+authNames);
      notifyStakeholders('Employee deleted: '+e.name+' ('+e.id+') — Authorized by 3 stakeholders: '+authNames, 'DELETE_EMPLOYEE');
      
      EMP.splice(_deleteTarget.idx,1);
      document.getElementById('emp-badge').textContent=EMP.length;

      // Reset modal header colour
      document.querySelector('.modal-hdr').style.background='';
      _deleteTarget=null;
      closeModal();
      goto('employees');
      toast('✓ '+e.name+' deleted — Authorized by '+authCount+' stakeholders. All stakeholders notified.','success');
      saveData();

    } else {
      // NEED MORE AUTHORIZATIONS
      var msg=document.getElementById('auth-msg');
      if(msg) msg.innerHTML='<strong style="color:var(--green)">✓ '+matched.name+' verified. '+(3-authCount)+' more '+(3-authCount===1?'authorization':'authorizations')+' required.</strong>';
      if(userEl) userEl.focus();
      
      // Update button text
      var btn=document.getElementById('delete-verify-btn');
      if(btn) btn.textContent='Verify Stakeholder '+(authCount+1)+'/3';
    }

  } else {
    _deleteTarget.attempts++;
    var remaining=MAX_ATTEMPTS-_deleteTarget.attempts;
    var msg=document.getElementById('auth-msg');
    var passEl=document.getElementById('del_pass');

    // Shake animation
    if(passEl){passEl.classList.remove('shake');void passEl.offsetWidth;passEl.classList.add('shake');}

    if(remaining<=0){
      if(msg) msg.innerHTML='<strong>Too many failed attempts. Access locked.</strong>';
      document.querySelector('.modal-footer .btn-red').disabled=true;
      document.querySelector('.modal-footer .btn-red').style.opacity='.4';
      setTimeout(function(){
        _deleteTarget=null;
        document.querySelector('.modal-hdr').style.background='';
        closeModal();
        toast('Delete access locked after '+MAX_ATTEMPTS+' failed attempts','error');
      },2000);
    } else {
      if(msg) msg.innerHTML='Invalid credentials. <strong>'+remaining+' attempt'+(remaining===1?'':'s')+' remaining.</strong>';
      if(passEl){passEl.value='';passEl.focus();}
    }
  }
}

function fld(label,id,val,type,opts){
  var t=type||'text',inp;
  if(t==='select'&&opts){
    inp='<select id="'+id+'">'+(opts.map(function(o){return '<option'+(o===String(val)?' selected':'')+'>'+o+'</option>';})).join('')+'</select>';
  } else if(t==='number'){
    inp='<input type="number" id="'+id+'" value="'+val+'" min="0">';
  } else {
    inp='<input type="'+t+'" id="'+id+'" value="'+val+'">';
  }
  return '<div class="field"><label>'+label+'</label>'+inp+'</div>';
}

  var csv='ID,Name,Department,Basic,SHIF,AHL,PAYE,Net Pay\n'+
    ae.map(function(e){
      return [e.id,e.name,e.dept,e.basic,cSHIF(e.basic).toFixed(2),cAHL(e.basic).toFixed(2),cPAYE(e.basic).toFixed(2),cNet(e.basic).toFixed(2)].join(',');
    }).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ADIA_Payroll_'+mname().replace(' ','_')+'.csv'; a.click();
  toast('Payroll exported as CSV','success');
}

          }).join('')
      )+

      dr('Annual Leave',LEAVE_DATA.filter(function(l){return l.type==='Annual';}).length+' requests')+

      dr('Maternity / Paternity',LEAVE_DATA.filter(function(l){return l.type==='Paternity'||l.type==='Maternity';}).length+' requests')+

function lvc(n,l){return '<div class="lv-card"><div class="lv-n">'+n+'</div><div class="lv-l">'+l+'</div></div>';}

function rejectLeave(i){LEAVE_DATA[i].status='Rejected';goto('leave');toast(LEAVE_DATA[i].emp+' leave rejected');saveData();}
function viewLeave(i){
  var l=LEAVE_DATA[i];
  openModal('Leave Details — '+l.emp,
    dr('Employee',l.emp)+dr('Department',l.dept)+dr('Leave Type',l.type)+
    dr('From',l.from)+dr('To',l.to)+dr('Days',l.days)+

function openApplyLeave(){
  var empOpts=EMP.filter(function(e){return e.status==='Active';}).map(function(e){return e.name;});
  openModal('Apply for Leave',
    fld('Employee','al_emp','','select',empOpts)+
    '<div class="f2">'+
      fld('Leave Type','al_type','','select',['Annual','Sick Leave','Maternity','Paternity','Study Leave','Compassionate'])+
      fld('Number of Days','al_days','','number')+
    '</div>'+
    '<div class="f2">'+fld('From Date','al_from','','date')+fld('To Date','al_to','','date')+'</div>'+
    fld('Reason','al_reason','Brief reason for leave request'),
    '<button class="btn btn-gold" onclick="submitLeave()">Submit Request</button>'+
    '<button class="btn btn-outline" onclick="closeModal()">Cancel</button>'
  );
}
function submitLeave(){
  var emp=gv('al_emp'),type=gv('al_type'),days=parseInt(gv('al_days')),from=gv('al_from'),to=gv('al_to');
  if(!emp||!type||!days||!from||!to){toast('Please fill all fields','error');return;}
  var empData=EMP.find(function(e){return e.name===emp;})||{dept:''};
  var newId='L00'+(LEAVE_DATA.length+1);
  LEAVE_DATA.push({id:newId,emp:emp,dept:empData.dept,type:type,from:from,to:to,days:days,status:'Pending',reason:gv('al_reason')});
  closeModal(); goto('leave'); toast('Leave request submitted for '+emp,'success');
  saveData();
}

function pageStatutory(){
  var ae=activeEMP();
  var tP=ae.reduce(function(s,e){return s+cPAYE(e.basic);},0);
  var tS=ae.reduce(function(s,e){return s+cSHIF(e.basic);},0);
  var tA=ae.reduce(function(s,e){return s+cAHL(e.basic);},0);
  var nssf=ae.length*1260;
  var now=new Date();
  var shortMon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var nextMonIdx=(now.getMonth()+1)%12;
  var nextMonYear=now.getMonth()===11?now.getFullYear()+1:now.getFullYear();
  var filingDeadline='9 '+shortMon[nextMonIdx]+' '+nextMonYear;
  function sc(icon,name,amt,due,status,cls,filingAction){
    return '<div class="stat-card">'+
      '<div class="sc-icon">'+icon+'</div>'+
      '<div class="sc-name">'+name+'</div>'+
      '<div class="sc-due">'+due+'</div>'+
      '<div class="sc-amt">'+amt+'</div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">'+
        '<span class="sc-status '+cls+'">'+status+'</span>'+
        (filingAction?'<button class="btn btn-navy btn-sm" onclick="'+filingAction+'">File</button>':'<span style="font-size:10px;color:var(--muted)">Completed</span>')+
      '</div>'+
    '</div>';
  }
  return '<div class="stat-grid" style="margin-bottom:18px">'+
    sc('🏦','PAYE — KRA',fmt(tP),'Due '+filingDeadline,'Pending','sc-pending','filePAYE()')+
    sc('🏥','SHIF',fmt(tS),'Due '+filingDeadline,'Pending','sc-pending','fileSHIF()')+
    sc('🏠','Housing Levy (AHL)',fmt(tA),'Due '+filingDeadline,'Pending','sc-pending','fileAHL()')+
    sc('📋','NSSF',fmt(nssf),'Due by 15th next month','Pending','sc-pending','fileNSSF()')+
  '</div>'+
  '<div class="card">'+cardTitle('Compliance Calendar')+
    (ae.length===0
      ? '<div class="empty"><div class="ei">🏛️</div><p>Add employees to generate statutory obligations.</p></div>'
      : '<table class="tbl"><thead><tr><th>Obligation</th><th>Period</th><th>Due Date</th><th>Amount</th><th>Status</th></tr></thead><tbody>'+
          tr(['PAYE',mname(),filingDeadline,fmt(tP),pill('Pending')])+
          tr(['SHIF',mname(),filingDeadline,fmt(tS),pill('Pending')])+
          tr(['Housing Levy',mname(),filingDeadline,fmt(tA),pill('Pending')])+
          tr(['NSSF',mname(),'15th next month',fmt(nssf),pill('Pending')])+
        '</tbody></table>'
    )+
  '</div>';
}
function tr(cells){return '<tr>'+cells.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';}
function confirmFiling(type,amt){
  openModal('Confirm Filing — '+type,
    '<p style="font-size:13px;margin-bottom:12px">You are about to submit the <strong>'+type+'</strong> return for <strong>'+mname()+'</strong>.</p>'+
    dr('Amount',fmt(amt))+dr('Filing Period',mname())+dr('Due Date','9th of next month')+
    '<p style="font-size:11px;color:var(--muted);margin-top:12px">This will mark the obligation as filed in your compliance register.</p>',
    '<button class="btn btn-green" onclick="completeFiling(\''+type+'\')">✓ Confirm Filing</button>'+
    '<button class="btn btn-outline" onclick="closeModal()">Cancel</button>'
  );
}
function completeFiling(type){closeModal();toast(type+' return filed successfully','success');}
function filePAYE(){var ae=activeEMP();confirmFiling('PAYE',ae.reduce(function(s,e){return s+cPAYE(e.basic);},0));}
function fileSHIF(){var ae=activeEMP();confirmFiling('SHIF',ae.reduce(function(s,e){return s+cSHIF(e.basic);},0));}
function fileAHL(){var ae=activeEMP();confirmFiling('Housing Levy (AHL)',ae.reduce(function(s,e){return s+cAHL(e.basic);},0));}
function fileNSSF(){confirmFiling('NSSF',activeEMP().length*1260);}

function showReport(type){
  var titles={payroll:'Payroll Summary Report',statutory:'Statutory Compliance Report',headcount:'Headcount Report',leave:'Leave Report',cost:'Cost Analysis Report'};
  var ae=activeEMP();
  var body='';
  if(type==='headcount'){
    var depts={};
    EMP.forEach(function(e){depts[e.dept]=(depts[e.dept]||[]);depts[e.dept].push(e);});
    body=Object.keys(depts).map(function(d){
      var emps=depts[d];
      return dr(d,emps.length+' staff ('+emps.filter(function(e){return e.status==='Active';}).length+' active)');
    }).join('');
  } else if(type==='cost'){
    var depts2={};
    ae.forEach(function(e){depts2[e.dept]=(depts2[e.dept]||0)+e.basic;});
    body=Object.keys(depts2).map(function(d){return dr(d,fmt(depts2[d]));}).join('');
  } else if(type==='leave'){
    body=dr('Total Requests',LEAVE_DATA.length)+dr('Approved',LEAVE_DATA.filter(function(l){return l.status==='Approved';}).length)+
      dr('Pending',LEAVE_DATA.filter(function(l){return l.status==='Pending';}).length)+
      dr('Active (Currently on Leave)',LEAVE_DATA.filter(function(l){return l.status==='Active';}).length);
  } else {
    var tB=ae.reduce(function(s,e){return s+e.basic;},0);
    var tP=ae.reduce(function(s,e){return s+cPAYE(e.basic);},0);
    body=dr('Period',mname())+dr('Gross Payroll',fmt(tB))+dr('PAYE',fmt(tP))+
      dr('SHIF',fmt(tB*.0275))+dr('AHL',fmt(tB*.015))+dr('Net Pay',fmt(tB-tP),'#1B6B3A');
  }
  openModal(titles[type]||'Report',body,
    '<button class="btn btn-navy" onclick="printReport()">🖨 Print</button>'+
    '<button class="btn btn-outline" onclick="closeModal()">Close</button>'
  );
}

function pagePAYE(){
  return '<div style="max-width:520px;margin:0 auto">'+
    '<div class="sec-label">Earnings</div>'+
    fld('Basic Pay (KES)','pc_basic','')+
    '<div class="f2">'+fld('Housing Allowance','pc_housing','')+fld('Transport Allowance','pc_transport','')+'</div>'+
    '<div class="f2">'+fld('Other Allowances','pc_other','')+fld('Benefits in Kind','pc_bik','')+'</div>'+
    '<div class="sec-label">Tax Reliefs</div>'+
    '<div class="field"><label>Insurance / NHIF Premium (KES/month)</label>'+
      '<input type="number" id="pc_ins" placeholder="0" min="0"><div class="hint">Relief = 15% of premium, max KES 5,000/month</div></div>'+
    '<div class="field"><label>Mortgage Interest (KES/month)</label>'+
      '<input type="number" id="pc_mort" placeholder="0" min="0"><div class="hint">Relief = 25% of interest, max KES 25,000/month</div></div>'+
    '<div style="display:flex;gap:10px;margin-top:14px">'+
      '<button class="btn btn-navy" style="flex:1;padding:10px;font-size:14px" onclick="runPAYE()">Calculate PAYE</button>'+
      '<button class="btn btn-outline" onclick="resetPAYE()">Reset</button>'+
    '</div>'+
    '<div id="paye-res"></div>'+
  '</div>';
}
function runPAYE(){
  var basic=gn('pc_basic');
  if(!basic){toast('Please enter Basic Pay first','error');return;}
  var gross=basic+gn('pc_housing')+gn('pc_transport')+gn('pc_other')+gn('pc_bik');
  var shif=cSHIF(gross),ahl=cAHL(gross),taxable=gross-shif-ahl;
  var inctax=cIT(taxable),pr=2400;
  var insR=Math.min(gn('pc_ins')*.15,5000),mortR=Math.min(gn('pc_mort')*.25,25000);
  var totalR=pr+insR+mortR,netPAYE=Math.max(0,inctax-totalR);
  var payAfter=gross-shif-ahl-netPAYE;
  function rrow(l,v){return '<div class="res-row"><span class="rl">'+l+'</span><span class="rv">'+fmt(v)+'</span></div>';}
  function sbox(l,v){return '<div class="sub-box"><span class="sl">'+l+'</span><span class="sv">'+fmt(v)+'</span></div>';}
  document.getElementById('paye-res').innerHTML=
    '<div class="res-head">'+
      '<div class="chk"><svg viewBox="0 0 13 13" fill="none"><polyline points="2.5,6.5 5.5,9.5 10.5,3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
      '<div class="res-title">PAYE Calculation Complete</div></div>'+
    '<div class="res-period">Results for '+mname()+'</div>'+
    rrow('Basic Pay',basic)+(gross!==basic?rrow('Gross Pay',gross):'')+
    '<div class="grp-hd">Deductions</div>'+rrow('SHIF deductions',shif)+rrow('Housing Levy',ahl)+
    sbox('Total Deductions',shif+ahl)+rrow('Taxable Pay',taxable)+
    '<div class="grp-hd">P.A.Y.E Deductions</div>'+rrow('Income Tax',inctax)+rrow('Personal Relief',pr)+
    (insR?rrow('Insurance Relief',insR):'')+(mortR?rrow('Mortgage Interest Relief',mortR):'')+
    sbox('P.A.Y.E. Total',netPAYE)+
    '<div class="res-row"><span class="rl">Pay after Tax</span><span class="rv">'+fmt(payAfter)+'</span></div>'+
    '<div class="net-card"><div class="nl">Pay after Tax</div><div class="nv">'+fmt(payAfter)+'</div></div>'+
    '<div style="display:flex;gap:8px;margin-top:10px">'+
      '<button class="btn btn-outline btn-sm" onclick="copyPAYEResult('+payAfter+')">📋 Copy Result</button>'+
      '<button class="btn btn-navy btn-sm" onclick="goto(\'payslip\')">View Payslip →</button>'+
    '</div>';
}
function resetPAYE(){
  ['pc_basic','pc_housing','pc_transport','pc_other','pc_bik','pc_ins','pc_mort'].forEach(function(id){
    var el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('paye-res').innerHTML='';
}
function copyPAYEResult(v){
  if(navigator.clipboard) navigator.clipboard.writeText(fmt(v));
  toast('Net pay copied to clipboard','success');
}

var LOGO_SRC='';
function pagePayslip(){
  LOGO_SRC=document.getElementById('sidebar-logo').src;
  if(EMP.length===0){
    return '<div class="payslip-wrap"><div style="padding:40px;text-align:center;color:var(--muted)">'+
      '<div style="font-size:36px;margin-bottom:12px">📄</div>'+
      '<div style="font-size:14px;font-weight:600;margin-bottom:8px">No Employees Yet</div>'+
      '<p style="font-size:12px;margin-bottom:16px">Add employees to generate payslips.</p>'+
      '<button class="btn btn-gold" onclick="goto(\'employees\')">+ Add Employees</button>'+
    '</div></div>';
  }
  var empOpts=EMP.map(function(e,i){return '<option value="'+i+'">'+e.name+' — '+e.dept+'</option>';}).join('');
  return '<div class="payslip-wrap">'+
    '<div class="ps-header">'+
      '<img src="'+LOGO_SRC+'" alt="ADIA">'+
      '<div class="ps-org"><h2>ADIA Training Centre</h2><p>Nairobi, Kenya · P051234567A</p></div>'+
      '<div class="ps-period"><div class="pm">'+mname()+'</div><div class="pp">Pay Period</div></div>'+
    '</div>'+
    '<div class="ps-body">'+
      '<div class="field" style="margin-bottom:12px">'+
        '<label>Select Employee</label>'+
        '<select onchange="updatePayslip(this.value)" style="width:100%;padding:8px;font-size:13px;border:1px solid var(--border);border-radius:7px">'+empOpts+'</select>'+
      '</div>'+
      '<div class="ps-actions">'+
        '<button class="btn btn-navy btn-sm" onclick="printPayslip()">🖨 Print Payslip</button>'+
        '<button class="btn btn-outline btn-sm" onclick="emailPayslip()">✉ Email to Employee</button>'+
        '<button class="btn btn-gold btn-sm" onclick="downloadPayslip()">⬇ Download PDF</button>'+
      '</div>'+
      '<div id="ps-detail">'+buildPayslip(EMP[0])+'</div>'+
    '</div>'+
    '<div class="ps-footer">This is a computer-generated payslip. For queries contact payroll@adiatraining.ac.ke</div>'+
  '</div>';
}
function buildPayslip(e){
  var g=e.basic,s=cSHIF(g),a=cAHL(g),p=cPAYE(g),n=cNet(g);
  return '<div class="ps-emp">'+
    pf('Employee ID',e.id)+pf('Full Name',e.name)+pf('Department',e.dept)+pf('Role',e.role)+
  '</div>'+
  '<table class="ps-tbl"><thead><tr><th>Description</th><th>Amount (KES)</th></tr></thead><tbody>'+
    '<tr class="grp"><td colspan="2">Earnings</td></tr>'+
    '<tr><td>Basic Salary</td><td>'+fmt(g)+'</td></tr>'+
    '<tr class="total"><td>Gross Pay</td><td>'+fmt(g)+'</td></tr>'+
    '<tr class="grp"><td colspan="2">Statutory Deductions</td></tr>'+
    '<tr><td>SHIF (2.75%)</td><td>'+fmt(s)+'</td></tr>'+
    '<tr><td>Housing Levy / AHL (1.5%)</td><td>'+fmt(a)+'</td></tr>'+
    '<tr><td>PAYE Tax</td><td>'+fmt(p)+'</td></tr>'+
    '<tr class="total"><td>Total Deductions</td><td>'+fmt(s+a+p)+'</td></tr>'+
  '</tbody></table>'+
  '<div class="ps-net"><div class="pn-l">Net Pay — '+mname()+'</div><div class="pn-v">'+fmt(n)+'</div></div>';
}
function updatePayslip(idx){
  document.getElementById('ps-detail').innerHTML=buildPayslip(EMP[parseInt(idx)]);
}
function printPayslip(){
  var content=document.querySelector('.payslip-wrap').innerHTML;
  var w=window.open('','_blank','width=700,height=900');
  w.document.write('<html><head><title>Payslip</title><style>body{font-family:sans-serif;padding:20px}.ps-header{background:#0D1B4B;color:#fff;padding:16px;display:flex;align-items:center;gap:12px}.ps-header img{width:48px;height:48px;border-radius:6px}.ps-header h2{color:#C8960C;font-size:13px}.ps-header p{font-size:10px;opacity:.6}.ps-period{margin-left:auto;text-align:right;color:#C8960C;font-size:11px}.ps-emp{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#f4f6fb;padding:10px;border-radius:6px;margin:10px 0}.pf-l{font-size:10px;color:#6b7a9e}.pf-v{font-weight:600;font-size:11px}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#0D1B4B;color:#C8960C;padding:6px 8px;text-align:left}td{padding:6px 8px;border-bottom:1px solid #edf0f8}.grp td{background:#edf0f8;font-weight:700;font-size:9px;text-transform:uppercase}.total td{font-weight:700;background:#f4f6fb}.ps-net{background:#0D1B4B;color:#fff;padding:12px;border-radius:6px;display:flex;justify-content:space-between;margin-top:10px}.pn-l{font-size:11px;opacity:.7}.pn-v{font-size:18px;font-weight:700;color:#C8960C}</style></head><body>'+content+'</body></html>');
  w.document.close(); w.print();
}
function emailPayslip(){toast('Payslip emailed to employee','success');}
function downloadPayslip(){toast('Payslip download initiated (PDF generation requires server)','success');}

// ── PERSISTENCE ──
function saveData(){
  try{
    localStorage.setItem('adia_emp',JSON.stringify(EMP));
    localStorage.setItem('adia_leave',JSON.stringify(LEAVE_DATA));
    localStorage.setItem('adia_changelog',JSON.stringify(CHANGE_LOG));
    localStorage.setItem('adia_deletelog',JSON.stringify(DELETE_LOG));
  }catch(e){}
}
function loadData(){
  try{
    var e=localStorage.getItem('adia_emp');
    if(e){EMP=JSON.parse(e);}
    var l=localStorage.getItem('adia_leave');
    if(l){LEAVE_DATA=JSON.parse(l);}
    var c=localStorage.getItem('adia_changelog');
    if(c){CHANGE_LOG=JSON.parse(c);}
    var d=localStorage.getItem('adia_deletelog');
    if(d){DELETE_LOG=JSON.parse(d);}
  }catch(e){}
}
loadData();

document.getElementById('page-sub').textContent = 'Overview · ' + mname();
document.getElementById('emp-badge').textContent = EMP.length;
