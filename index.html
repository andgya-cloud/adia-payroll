<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Particles with Hand Tracking</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #video-element {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* Hidden but active */

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 200px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.active {
            background: #4a9eff;
            border-color: #4a9eff;
            color: white;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 35px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
        }

        #status {
            font-size: 0.8rem;
            text-align: center;
            color: #888;
            margin-top: 10px;
        }

        .loading {
            color: #f0ad4e;
        }

        .ready {
            color: #5cb85c;
        }

        .error {
            color: #d9534f;
        }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- MediaPipe Hands & Camera Utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

    <video id="video-element" playsinline></video>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Particle Shapes</h1>

        <div class="control-group">
            <label>Templates</label>
            <button onclick="setShape('heart')" id="btn-heart" class="active">Heart</button>
            <button onclick="setShape('flower')" id="btn-flower">Flower</button>
            <button onclick="setShape('saturn')" id="btn-saturn">Saturn</button>
            <button onclick="setShape('buddha')" id="btn-buddha">Buddha</button>
            <button onclick="setShape('fireworks')" id="btn-fireworks">Fireworks</button>
        </div>

        <div class="control-group">
            <label>Color</label>
            <input type="color" id="color-picker" value="#4a9eff">
        </div>

        <div id="status" class="loading">Initalizing Hands...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PARTICLE_COUNT = 8000;
        const PARTICLE_SIZE = 0.15;
        const INITIAL_COLOR = 0x4a9eff;
        const LERP_SPEED = 0.08; // Morphing speed

        // --- STATE ---
        let particles, geometry, material;
        let positionsAttribute;
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let currentPositions = new Float32Array(PARTICLE_COUNT * 3);
        let scene, camera, renderer;
        let time = 0;
        let handTension = 0; // 0 to 1
        let isHandDetected = false;
        let currentScale = 1;
        let targetScale = 1;

        // --- INIT THREE.JS ---
        function initScene() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            // Add some fog for depth
            scene.fog = new THREE.FogExp2(0x050505, 0.035);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            camera.position.y = 2;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Particles
            geometry = new THREE.BufferGeometry();

            // Fill initial positions (random sphere)
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                currentPositions[i] = (Math.random() - 0.5) * 10;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

            // Texture for particle (soft dot)
            const sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');

            material = new THREE.PointsMaterial({
                color: INITIAL_COLOR,
                size: PARTICLE_SIZE,
                map: sprite,
                transparent: true,
                alphaTest: 0.5,
                blending: THREE.AdditiveBlending,
                opacity: 0.8
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Initial Shape
            generateHeart();

            // Resize listener
            window.addEventListener('resize', onWindowResize, false);

            // Start Loop
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- SHAPE GENERATORS ---
        // Helper: Random point in sphere
        function randomSpherePoint(radius) {
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            return { x, y, z };
        }

        function setShape(name) {
            // Update UI buttons
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${name}`).classList.add('active');

            switch (name) {
                case 'heart': generateHeart(); break;
                case 'flower': generateFlower(); break;
                case 'saturn': generateSaturn(); break;
                case 'buddha': generateBuddha(); break; // Approximation
                case 'fireworks': generateFireworks(); break;
            }
        }

        function generateHeart() {
            // Parametric Heart
            // x = 16sin^3(t)
            // y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
            // z = variation width
            const scale = 0.25;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = Math.random() * Math.PI * 2;
                // Add some thickness variance
                const r = Math.random();

                // Spread points slightly off the line to make it 3D-ish volume
                const spread = (Math.random() - 0.5) * 2;

                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                const z = spread * 3;

                targetPositions[i * 3] = x * scale;
                targetPositions[i * 3 + 1] = y * scale + 2; // Offset y to center
                targetPositions[i * 3 + 2] = z * scale;
            }
        }

        function generateFlower() {
            // Polar roses: r = cos(k*theta)
            const k = 4; // Petals
            const scale = 5;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = (Math.random() - 0.5) * Math.PI; // 3D spread

                // Base radius modulated by sine wave for petals
                let r = Math.cos(k * theta) + 1.5; // +1.5 to keep center open
                r *= (Math.random() * 0.5 + 0.5); // Randomize radial fill

                const x = r * Math.cos(theta) * scale;
                const y = r * Math.sin(theta) * scale;
                const z = (Math.random() - 0.5) * 2; // Flat-ish

                targetPositions[i * 3] = x;
                targetPositions[i * 3 + 1] = y;
                targetPositions[i * 3 + 2] = z;
            }
        }

        function generateSaturn() {
            const planetRadius = 3;
            const ringInner = 4.5;
            const ringOuter = 7;
            const ringRatio = 0.6; // % of particles for ring

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                if (i < PARTICLE_COUNT * (1 - ringRatio)) {
                    // Planet Body (Sphere)
                    const p = randomSpherePoint(planetRadius);
                    targetPositions[i * 3] = p.x;
                    targetPositions[i * 3 + 1] = p.y;
                    targetPositions[i * 3 + 2] = p.z;
                } else {
                    // Ring (Disc with hole)
                    const theta = Math.random() * Math.PI * 2;
                    const r = ringInner + Math.random() * (ringOuter - ringInner);
                    const x = r * Math.cos(theta);
                    const z = r * Math.sin(theta);
                    const y = (Math.random() - 0.5) * 0.2; // Thin ring

                    // Tilt the ring
                    const tilt = Math.PI / 6; // 30 degrees
                    // Rotate around X axis
                    const yRot = y * Math.cos(tilt) - z * Math.sin(tilt);
                    const zRot = y * Math.sin(tilt) + z * Math.cos(tilt);

                    targetPositions[i * 3] = x;
                    targetPositions[i * 3 + 1] = yRot;
                    targetPositions[i * 3 + 2] = zRot;
                }
            }
        }

        function generateBuddha() {
            // Rough approximation using stacked spheres/volumes
            // Head, Body, Crossed Legs
            // Ratios based on simple figure drawing

            const headP = 0.15;
            const bodyP = 0.35;
            const legsP = 0.5;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z;

                if (i < PARTICLE_COUNT * headP) {
                    // Head
                    const p = randomSpherePoint(1.2);
                    x = p.x;
                    y = p.y + 4.5;
                    z = p.z;
                } else if (i < PARTICLE_COUNT * (headP + bodyP)) {
                    // Body (Oval/Cylinderish)
                    const theta = Math.random() * Math.PI * 2;
                    const h = Math.random() * 3.5; // Height
                    const r = 2.0 * (1 - Math.abs(h / 3.5 - 0.5) * 0.5); // Taper slighty
                    x = r * Math.cos(theta) * (Math.random());
                    z = r * Math.sin(theta) * (Math.random());
                    y = h + 1.0;
                } else {
                    // Legs (Torus half or flattened sphere interaction)
                    // Let's do a wide flattened ellipsoid at base
                    const p = randomSpherePoint(3.5);
                    x = p.x * 1.5; // Wider x
                    y = Math.abs(p.y) * 0.8; // flattening bottom? no, just create volume
                    y = p.y * 0.5 + 0.5; // Squat
                    z = p.z * 1.2; // Wider z
                }

                targetPositions[i * 3] = x;
                targetPositions[i * 3 + 1] = y - 2; // Center vertically
                targetPositions[i * 3 + 2] = z;
            }
        }

        function generateFireworks() {
            // Burst from center logic
            // But to make it a shape, we'll make a large sphere 
            // where particles are concentrated in "streamers" (lines from center)
            const numStreamers = 50;
            const particlesPerStreamer = Math.floor(PARTICLE_COUNT / numStreamers);
            const maxRadius = 8;

            for (let s = 0; s < numStreamers; s++) {
                // Random direction for this streamer
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);

                const dirX = Math.sin(phi) * Math.cos(theta);
                const dirY = Math.sin(phi) * Math.sin(theta);
                const dirZ = Math.cos(phi);

                for (let p = 0; p < particlesPerStreamer; p++) {
                    const idx = (s * particlesPerStreamer + p) * 3;
                    if (idx >= targetPositions.length) break;

                    // Distribute along the line with some randomness
                    const dist = Math.random() * maxRadius;
                    // Spread width of streamer
                    const spread = 0.2;

                    targetPositions[idx] = dirX * dist + (Math.random() - 0.5) * spread;
                    targetPositions[idx + 1] = dirY * dist + (Math.random() - 0.5) * spread;
                    targetPositions[idx + 2] = dirZ * dist + (Math.random() - 0.5) * spread;
                }
            }
        }

        // --- HAND TRACKING ---
        const videoElement = document.getElementById('video-element');
        const statusElement = document.getElementById('status');

        function onResults(results) {
            statusElement.className = 'ready';
            statusElement.innerText = "Tracking Active";

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandDetected = true;

                // Calculate average tension of all detected hands
                let totalTension = 0;

                for (const landmarks of results.multiHandLandmarks) {
                    totalTension += calculateHandTension(landmarks);
                }

                handTension = totalTension / results.multiHandLandmarks.length;
            } else {
                isHandDetected = false;
                handTension = 0;
            }
        }

        function calculateHandTension(landmarks) {
            // Palm center (approximate with Wrist (0) + Middle Finger MCP (9))
            // Actually, let's just use Wrist (0) as base.
            const wrist = landmarks[0];

            // Fingertips: 4 (Thumb), 8 (Index), 12 (Middle), 16 (Ring), 20 (Pinky)
            const tips = [4, 8, 12, 16, 20];
            let avgDist = 0;

            tips.forEach(idx => {
                const tip = landmarks[idx];
                const d = Math.sqrt(
                    Math.pow(tip.x - wrist.x, 2) +
                    Math.pow(tip.y - wrist.y, 2) +
                    Math.pow(tip.z - wrist.z, 2)
                );
                avgDist += d;
            });

            avgDist /= 5;

            // Map distance to 0-1 range
            // Closed fist ~0.15 - 0.2
            // Open hand ~0.4 - 0.6
            // These values depend on camera distance, but normalized coords help.
            // Using approximate heuristic values:
            const minOpen = 0.15;
            const maxOpen = 0.45;

            let tension = (avgDist - minOpen) / (maxOpen - minOpen);
            tension = Math.max(0, Math.min(1, tension));

            return tension;
        }

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });

        cameraUtils.start()
            .then(() => {
                statusElement.innerText = "Camera Started";
            })
            .catch(err => {
                console.error(err);
                statusElement.className = 'error';
                statusElement.innerText = "Camera Error (See Console)";
            });

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            const positions = particles.geometry.attributes.position.array;

            // Interaction Logic: 
            // Tension 0 (Fist) -> Contraction / Small Scale
            // Tension 1 (Open) -> Expansion / Large Scale
            // If no hand, breathe normally around scale 1.0

            if (isHandDetected) {
                // Map tension (0..1) to scale (0.5 .. 2.0)
                // 0 -> 0.5
                // 1 -> 2.0
                const desiredScale = 0.5 + (handTension * 1.5);
                targetScale += (desiredScale - targetScale) * 0.1; // Smooth transition
            } else {
                // Idle breathing
                targetScale += (1.0 + Math.sin(time) * 0.1 - targetScale) * 0.05;
            }

            // Update Loop
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const px = positions[i * 3];
                const py = positions[i * 3 + 1];
                const pz = positions[i * 3 + 2];

                const tx = targetPositions[i * 3];
                const ty = targetPositions[i * 3 + 1];
                const tz = targetPositions[i * 3 + 2];

                // 1. Morphing: Move towards target shape
                // We actually want to apply Scale to the TARGET position, not the current one iteratively.
                // But current position tracks target. 

                // Apply Scale to Target
                const scaledTx = tx * targetScale;
                const scaledTy = ty * targetScale;
                const scaledTz = tz * targetScale;

                // Lerp towards Scaled Target
                positions[i * 3] += (scaledTx - px) * LERP_SPEED;
                positions[i * 3 + 1] += (scaledTy - py) * LERP_SPEED;
                positions[i * 3 + 2] += (scaledTz - pz) * LERP_SPEED;

                // 2. Add some noise/drift if idle for organic feel
                if (!isHandDetected) {
                    positions[i * 3] += Math.sin(time + px) * 0.002;
                    positions[i * 3 + 1] += Math.cos(time + py) * 0.002;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;

            // Rotate the whole system slowly
            if (particles) {
                particles.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        // --- UI EVENTS ---
        document.getElementById('color-picker').addEventListener('input', (e) => {
            if (material) {
                material.color.set(e.target.value);
            }
        });

        // Start
        initScene();

    </script>
</body>

</html>
